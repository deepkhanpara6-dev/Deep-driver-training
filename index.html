<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Safety Training</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background-color: #e9ecef; 
            color: #333;
        }
        
        #app-container {
            max-width: 450px; 
            margin: 0 auto; 
            background: white; 
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 { color: #002d72; margin-top: 10px; }
        
        /* The Video Area */
        #video-wrapper {
            position: relative; /* Crucial for the shield to work */
            width: 100%; 
            aspect-ratio: 16 / 9; 
            margin-top: 20px; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #player { 
            width: 100%; 
            height: 100%; 
        }

        /* THIS IS THE INVISIBLE SHIELD */
        /* It sits over the video so drivers cannot tap the screen to skip */
        #video-shield {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: 10;
            background: transparent;
        }
        
        #form-container { 
            display: none; 
            margin-top: 20px; 
        }
        iframe.gform { 
            width: 100%; 
            height: 600px; 
            border: none; 
        }
        
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <h2>Terminal Safety Training</h2>
        <p id="instruction-text">Tap Start Training. The attendance form will appear automatically when the video concludes.</p>

        <div id="video-wrapper">
            <div id="video-shield"></div> 
            <div id="player"></div>
        </div>

        <button id="play-btn" class="btn">Start Training</button>

        <div id="form-container">
            <h3>Training Complete. Please log your details:</h3>
            <iframe class="gform" src="https://docs.google.com/forms/d/e/1FAIpQLSdlLC04kRj8tT4mE4QiepU_Jz1JtS8aGKjwvyHdDqO20xLvcw/viewform?embedded=true"></iframe>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'JKeDqTbi7_M', 
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,      /* Hides the bottom progress bar */
                    'disablekb': 1,     /* Disables keyboard skipping */
                    'rel': 0,           /* Stops random videos from showing at the end */
                    'modestbranding': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // The Start Button triggers the video beneath the shield
        document.getElementById('play-btn').addEventListener('click', function() {
            player.playVideo();
            this.style.display = 'none'; 
        });

        // Listens for the exact moment the video ends to reveal the form
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                document.getElementById('form-container').style.display = 'block';
                document.getElementById('instruction-text').innerText = "Please fill out the form below to register your tanker.";
            }
        }
    </script>
</body>
</html>
